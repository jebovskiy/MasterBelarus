name: CI

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'api/package-lock.json'

      # Fallback: у тебя пока нет package-lock.json, поэтому этот кэш просто не сработает.
      # Если потом npm install/update — lockfile появится, и кэш заработает автоматически.

      - name: install
        run: npm ci || npm install

      - name: typecheck
        run: npm run typecheck

      - name: lint
        run: npm run lint -- --max-warnings 0 || true

      - name: test
        run: npm test

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: install
        run: npm ci || npm install

      - name: typecheck
        run: npm run typecheck

      - name: lint
        run: npm run lint || true

      - name: build
        run: npm run build
