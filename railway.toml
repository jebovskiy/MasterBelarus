[build]
builder = "NIXPACKS"
buildCommand = "cd api && npm ci --omit=dev && npx tsc -p tsconfig.json && node -e 'console.log(\"api build ok\")'"

[deploy]
startCommand = "node dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[phases.setup]
nixPkgs = ["nodejs_22"]
